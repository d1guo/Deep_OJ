services:
  # 1. 缓存数据库
  redis:
    image: redis:alpine
    container_name: oj-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-deepoj_redis_change_me}"]
    expose:
      - "6379"
    networks:
      - deep-oj-net

  # 2. 工作节点 (Go Wrapper + C++ Core)
  worker:
    build: .
    image: deep-oj:v3
    container_name: oj-worker
    init: true
    command: /app/oj_worker
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - SYS_CHROOT
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./data/workspace:/data/workspace:rw
      - ./config.docker.yaml:/app/config.docker.yaml:ro
    environment:
      - APP_CONFIG=/app/config.docker.yaml
    networks:
      - deep-oj-net
    depends_on:
      - redis
      - minio

  # 3. 调度器 (大脑)
  scheduler:
    build: .
    image: deep-oj:v3
    container_name: oj-scheduler
    restart: on-failure
    user: deep_oj
    command: /app/oj_scheduler
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
    environment:
      - APP_CONFIG=/app/config.docker.yaml
    networks:
      - deep-oj-net
    depends_on:
      - worker
      - redis
      - postgres

  # 4. API Server (大门)
  api:
    build: .
    image: deep-oj:v3
    container_name: oj-api
    restart: on-failure
    user: deep_oj
    command: /app/oj_api
    ports:
      - "18080:18080"
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
    environment:
      - APP_CONFIG=/app/config.docker.yaml
    networks:
      - deep-oj-net
    depends_on:
      - redis
      - scheduler
      - postgres
      - minio

  # 5. 关系型数据库
  postgres:
    image: postgres:15-alpine
    container_name: oj-postgres
    restart: always
    environment:
      - POSTGRES_USER=deep_oj
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-deepoj_pg_password_change_me}
      - POSTGRES_DB=deep_oj
    volumes:
      - ./sql/migrations:/docker-entrypoint-initdb.d
    expose:
      - "5432"
    networks:
      - deep-oj-net

  # 6. 对象存储 (MinIO)
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: oj-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-deepoj_minio_user}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-deepoj_minio_password_change_me}
    expose:
      - "9000"
      - "9001"
    networks:
      - deep-oj-net

networks:
  deep-oj-net:
    driver: bridge
