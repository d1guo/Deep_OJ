global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets:
          # 替换为 node-control 私网地址
          - "127.0.0.1:18080"
    authorization:
      type: Bearer
      credentials: deepoj_metrics_token_dev

  - job_name: scheduler
    metrics_path: /metrics
    static_configs:
      - targets:
          # scheduler 与 prometheus 同机时可使用 127.0.0.1:9091（需在配置中启用端口）
          - "127.0.0.1:9091"

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets:
          # 替换为 worker 节点私网地址列表
          - "10.0.1.21:9092"
